<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscríbete</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .form-container {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        padding: 35px;
        border-radius: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
        border: 1px solid rgba(255, 255, 255, 0.18);
    }
    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #fff;
        font-weight: 600;
        letter-spacing: 0.5px;
    }
    .form-group { margin-bottom: 18px; }
    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
    }
    input[type="email"] {
        width: 100%;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        box-sizing: border-box;
        transition: all 0.3s;
        font-size: 15px;
    }
    input[type="email"]::placeholder { color: rgba(255, 255, 255, 0.4); }
    input[type="email"]:focus {
        outline: none;
        border-color: #00f5d4;
        box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.2);
        background: rgba(255, 255, 255, 0.12);
    }
    input[type="email"].invalid {
        border-color: #ff006e;
        background: rgba(255, 0, 110, 0.1);
    }
    input[type="email"].valid { border-color: #00f5d4; }
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 22px 0;
    }
    input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: #00f5d4;
    }
    button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(90deg, #00f5d4, #00bbf9);
        color: #0f0c29;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
    }
    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 245, 212, 0.3);
    }
    button:disabled {
        background: #444;
        color: #888;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }
    .error {
        color: #ff006e;
        font-size: 13px;
        margin-top: 6px;
        display: none;
    }
    .success {
        color: #00f5d4;
        text-align: center;
        margin-top: 15px;
        display: none;
        font-weight: 600;
    }
    a {
        color: #00bbf9;
        text-decoration: none;
        font-weight: 500;
    }
    a:hover { text-decoration: underline; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Suscríbete al Newsletter</h2>
        <form id="subscriptionForm" novalidate>
            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                <div class="error" id="emailError">Ingresa un correo válido. Ej: nombre@dominio.com</div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">Acepto los <a href="#" target="_blank">términos y condiciones</a></label>
            </div>
            <div class="error" id="termsError">Debes aceptar los términos y condiciones</div>

            <button type="submit" id="submitBtn">Suscribirme</button>
            <div class="success" id="successMsg">¡Listo! Ya estás suscrito 🎉</div>
        </form>
    </div>

    <script>
        const form = document.getElementById('subscriptionForm');
        const email = document.getElementById('email');
        const terms = document.getElementById('terms');
        const emailError = document.getElementById('emailError');
        const termsError = document.getElementById('termsError');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        function validateEmail() {
            if (email.value === '') {
                email.classList.remove('invalid', 'valid');
                emailError.style.display = 'none';
                return false;
            } else if (!emailRegex.test(email.value)) {
                emailError.style.display = 'block';
                email.classList.add('invalid');
                email.classList.remove('valid');
                return false;
            } else {
                emailError.style.display = 'none';
                email.classList.add('valid');
                email.classList.remove('invalid');
                return true;
            }
        }

        function validateTerms() {
            if (!terms.checked) {
                termsError.style.display = 'block';
                return false;
            } else {
                termsError.style.display = 'none';
                return true;
            }
        }

        email.addEventListener('input', validateEmail);
        terms.addEventListener('change', validateTerms);

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const isEmailValid = validateEmail();
            const areTermsValid = validateTerms();

            if (isEmailValid && areTermsValid) {
                successMsg.style.display = 'block';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviado ✓';
                submitBtn.style.background = '#80FF00';
                submitBtn.style.color = '#0D0A1F';

                setTimeout(() => {
                    form.reset();
                    email.classList.remove('valid', 'invalid');
                    successMsg.style.display = 'none';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Suscribirme';
                    submitBtn.style.background = '#9D4EDD';
                    submitBtn.style.color = 'white';
                }, 3000);
            }
        });
    </script>
</body>
</html>
