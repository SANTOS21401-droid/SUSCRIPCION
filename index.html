<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscríbete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0D0A1F;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: #1E1B3A;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(157, 78, 221, 0.3);
            width: 100%;
            max-width: 400px;
            border: 1px solid #9D4EDD;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #257d38;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #0e2389;
        }
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #70a6e8;
            border-radius: 10px;
            background: #2b6fc3;
            color: white;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input[type="email"]:focus {
            outline: none;
            border-color: #206481;
            box-shadow: 0 0 0 3px rgba(199, 125, 255, 0.3);
        }
        input[type="email"].invalid {
            border-color: #FF6D00;
            background: #3D1F00;
        }
        input[type="email"].valid {
            border-color: #80FF00;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #9D4EDD;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #144093;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #28572c;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        .error {
            color: #FF6D00;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        .success {
            color: #80FF00;
            text-align: center;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
        a {
            color: #5965eb;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Suscríbete al Newsletter</h2>
        <form id="subscriptionForm" novalidate>
            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                <div class="error" id="emailError">Ingresa un correo válido. Ej: nombre@dominio.com</div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">Acepto los <a href="#" target="_blank">términos y condiciones</a></label>
            </div>
            <div class="error" id="termsError">Debes aceptar los términos y condiciones</div>

            <button type="submit" id="submitBtn">Suscribirme</button>
            <div class="success" id="successMsg">¡Listo! Ya estás suscrito 🎉</div>
        </form>
    </div>

    <script>
        const form = document.getElementById('subscriptionForm');
        const email = document.getElementById('email');
        const terms = document.getElementById('terms');
        const emailError = document.getElementById('emailError');
        const termsError = document.getElementById('termsError');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        function validateEmail() {
            if (email.value === '') {
                email.classList.remove('invalid', 'valid');
                emailError.style.display = 'none';
                return false;
            } else if (!emailRegex.test(email.value)) {
                emailError.style.display = 'block';
                email.classList.add('invalid');
                email.classList.remove('valid');
                return false;
            } else {
                emailError.style.display = 'none';
                email.classList.add('valid');
                email.classList.remove('invalid');
                return true;
            }
        }

        function validateTerms() {
            if (!terms.checked) {
                termsError.style.display = 'block';
                return false;
            } else {
                termsError.style.display = 'none';
                return true;
            }
        }

        email.addEventListener('input', validateEmail);
        terms.addEventListener('change', validateTerms);

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const isEmailValid = validateEmail();
            const areTermsValid = validateTerms();

            if (isEmailValid && areTermsValid) {
                successMsg.style.display = 'block';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviado ✓';
                submitBtn.style.background = '#80FF00';
                submitBtn.style.color = '#0D0A1F';

                setTimeout(() => {
                    form.reset();
                    email.classList.remove('valid', 'invalid');
                    successMsg.style.display = 'none';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Suscribirme';
                    submitBtn.style.background = '#9D4EDD';
                    submitBtn.style.color = 'white';
                }, 3000);
            }
        });
    </script>
</body>
</html>
